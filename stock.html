<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./stock.css" />
  </head>
  <body>
    <div class="div">
      <header>
        <div class="fornavbar">
          <div class="navbar">
            <div class="navbar-logo">
              <h3>Stockology</h3>
            </div>
            <div class="navbar-links">
              <ul>
                <li type="none" class="links">
                  <a class="btn" href="stock.html">About</a>
                </li>
                <li type="none" class="links">
                  <a class="btn" href="stock.html">Contect</a>
                </li>
                <li type="none" class="links">
                  <a class="btn" href="stock.html">Privacy policy</a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </header>
      <div class="hero-section">
        <div class="left-section">
          <img src="./theme-1.svg" alt="" />
        </div>
        <div class="login">
          <h2>Login</h2>
          <ol class="formmain">
            <label for="">Email</label>
            <br />
            <form>
              <input
                class="email"
                type="email"
                placeholder="Enter your email"
              />
              <br /><br />
            </form>
            <label for="">Password</label>
            <br />
            <form>
              <input type="password" placeholder="Enter your password" />
            </form>
          </ol>
          <a class="forgetpassword" href="#">Forget password</a>
          <button class="loginbutton">Login</button>
        </div>

        <div class="right-section">
          <img src="./theme2.svg" alt="" width="400px" height="580px" />
        </div>
      </div>
    </div>
  </body>
</html>
